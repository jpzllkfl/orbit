# TrueNAS / Dockge — Windows T: = \\192.168.1.177\media
# Host path on this NAS: /mnt/broken_eye/media (NOT /mnt/tank/media)
# Single share mount so folder picker works like Plex (browse T: / share, pick subfolders).

services:
  orbit:
    build: .
    image: orbit:latest
    container_name: orbit
    ports:
      - "${ORBIT_PORT:-8090}:8090"
    environment:
      PORT: 8090
      ORBIT_DOCKER: "1"
      ORBIT_OMS_AUTO_SEED: "0"
      ORBIT_MEDIA_ROOT: ${ORBIT_MEDIA_ROOT:-/mnt/broken_eye/media}
      ORBIT_MEDIA_BROWSE_ROOT: /media/share
      ORBIT_TMDB_API_KEY: "b379792391747f1606e1d7a933dd2aea"
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -c
      - mkdir -p /app/server/data/states && chmod -R 777 /app/server/data && exec node server/index.js
    volumes:
      - ./data:/app/server/data
      - ${ORBIT_MEDIA_ROOT:-/mnt/broken_eye/media}:/media/share:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
