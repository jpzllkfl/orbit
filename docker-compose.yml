services:
  orbit:
    build: .
    image: orbit:latest
    container_name: orbit
    ports:
      - "${ORBIT_PORT:-8090}:8090"
    environment:
      PORT: 8090
      ORBIT_DOCKER: "1"
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -c
      - mkdir -p /app/server/data/states && chmod -R 777 /app/server/data && exec node server/index.js
    volumes:
      # Bind mount avoids TrueNAS named-volume permission issues; lives in stack folder
      - ./data:/app/server/data
      # Mount your media folders here (paths in Orbit must match container paths)
      # - "D:/Media/Movies:/media/movies:ro"
      # - "D:/Media/TV:/media/tv:ro"
    restart: unless-stopped
    extra_hosts:
      # Plex on the Docker host (same PC) — container reaches it via this hostname
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

